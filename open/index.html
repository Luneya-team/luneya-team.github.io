<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Luneya</title>
</head>
<body>
<script>
  const isIos = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  const isAndroid = /Android/i.test(navigator.userAgent);
  
  const params = new URLSearchParams(window.location.search);
  const page = params.get("page") || "home";

  // Pages supportées
  const validPages = ["home", "meditation", "journal", "ambient", "story", "search", "account", "pomodoro"];
  const destination = validPages.includes(page) ? page : "home";

  window.location.href = "luneya://" + destination;

  setTimeout(function() {
    if (isIos) {
      window.location.href = "https://apps.apple.com/app/id6741454068";
    } else if (isAndroid) {
      window.location.href = "https://play.google.com/store/apps/details?id=com.ymcoding.hypno";
    }
  }, 1500);
</script>
</body>
</html>
